name: release-installer

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run installer tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 python3 -B -m unittest discover -s tests -p 'test_*.py'

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build SHA256SUMS
        run: |
          mkdir -p checksums
          sha256sum installer/sori_agent.py installer/install.sh installer/run_mock_openclaw_server.py > checksums/SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/sori_agent.py
            installer/install.sh
            installer/run_mock_openclaw_server.py
            checksums/SHA256SUMS
